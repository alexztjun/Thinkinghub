name: Thinkinghub Final Bot
on:
  schedule:
    - cron: '0 0 * * *' # 北京时间 8:00
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install google-generativeai requests feedparser PyYAML
      - name: Run Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LARK_WEBHOOK: ${{ secrets.LARK_WEBHOOK }}
        run: python main.py
